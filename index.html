<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ephemeral-Letters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        body { background: #0f172a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .gradient-text { background: linear-gradient(45deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

    <div id="app" class="w-full max-w-md p-8 rounded-3xl glass shadow-2xl">
        <div class="text-center mb-8">
            <!-- CHANGE 3: Title is now a link to reset -->
            <h1 onclick="resetApp()" 
                class="text-3xl font-bold gradient-text mb-2 cursor-pointer hover:opacity-80 transition active:scale-95">Ephemeral-Letters</h1>
            <p class="text-slate-400 text-sm">Secure, invisible, one-time messages.</p>
        </div>

        <div id="view-selection" class="space-y-4">
            <button onclick="showCreate()" class="w-full p-4 bg-sky-600 hover:bg-sky-500 rounded-xl font-semibold transition">Create a Secret Letter</button>
            <button onclick="showRead()" class="w-full p-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-semibold transition border border-slate-700">Read a Received Letter</button>
            
            <!-- CHANGE 2: Box to paste link -->
            <div class="pt-4 border-t border-slate-700">
                <label class="text-[10px] text-slate-500 uppercase font-bold mb-2 block text-center">Received a link?</label>
                <div class="flex gap-2">
                    <input type="text" id="manual-url-input" placeholder="Paste link here..." class="flex-1 p-2 bg-slate-900 border border-slate-700 rounded-lg text-xs outline-none focus:border-sky-500">
                    <button onclick="handleManualLink()" class="px-4 py-2 bg-slate-700 rounded-lg text-xs hover:bg-slate-600 transition">Open</button>
                </div>
            </div>
        </div>

        <div id="view-create" class="hidden space-y-4">
            <textarea id="create-msg" placeholder="Type your secret message here..." class="w-full h-32 p-4 bg-slate-900 border border-slate-700 rounded-xl focus:ring-2 focus:ring-sky-500 outline-none text-sm"></textarea>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold px-1">Max Uses</label>
                    <input type="number" id="create-max" value="1" min="1" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl mt-1 text-sm">
                </div>
                <div>
                    <label class="text-[10px] text-slate-500 uppercase font-bold px-1">Passphrase (Opt)</label>
                    <input type="password" id="create-key" placeholder="None" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl mt-1 text-sm">
                </div>
            </div>
            <button onclick="generateLink()" class="w-full p-4 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-semibold transition">Generate Link</button>
            <button onclick="switchView('view-selection')" class="w-full text-sm text-slate-500 hover:text-white transition">← Back</button>
        </div>

        <div id="view-share" class="hidden space-y-4 text-center">
            <div class="p-4 bg-slate-900 rounded-xl border border-dashed border-slate-600 break-all text-[10px] text-sky-400 font-mono" id="final-link"></div>
            <button onclick="copyLink()" id="copy-link-btn" class="w-full p-4 bg-emerald-600 hover:bg-emerald-500 rounded-xl font-semibold transition">Copy Link to Share</button>
            <p class="text-[10px] text-slate-500 italic">This link contains the encrypted message. It is never stored on a server.</p>
        </div>

        <div id="view-read" class="hidden space-y-4">
            <div id="unlock-area" class="space-y-4">
                <p class="text-center text-slate-300">This letter is locked.</p>
                <input type="password" id="read-key" placeholder="Enter secret key" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl outline-none focus:border-sky-500">
                <button onclick="decryptMessage()" class="w-full p-4 bg-sky-600 hover:bg-sky-500 rounded-xl font-semibold transition">Unlock with Key</button>
            </div>
            
            <div id="receive-area" class="hidden text-center space-y-6">
                <p class="text-lg text-slate-200">Heres your secret letter, click the button below to receive it.</p>
                <button id="burn-btn" onclick="burnAndCopy()" class="w-full py-8 bg-gradient-to-r from-red-500 to-orange-500 hover:scale-105 rounded-2xl font-bold text-xl shadow-lg transition transform">
                    RECEIVE & BURN
                </button>
                <p id="use-status" class="text-xs text-red-400 uppercase tracking-widest">Global One-Time Copy</p>
            </div>
        </div>
    </div>

    <script>
        // Place this at the top so it's globally available
        function resetApp() {
            // Clear the URL hash (the secret data)
            window.history.replaceState(null, null, window.location.pathname);
            // Force reload to the main selection screen
            window.location.href = window.location.origin + window.location.pathname;
        }

        
        let encryptedPayload = "";

        // CHANGE 2: Handle manual input
        function handleManualLink() {
            const input = document.getElementById('manual-url-input').value.trim();
            if (!input) return;

            try {
                // Find the part after the '#'
                const url = new URL(input.startsWith('http') ? input : 'https://' + input);
                const hash = url.hash.substring(1);
        
                if (hash) {
                    window.location.hash = hash;
                    showRead(); // This triggers the decryption view
                } else {
                    alert("This link doesn't contain a secret code.");
                }
            } catch (e) {
                // Fallback for when they paste just the code, not the whole URL
                if (input.includes(':')) {
                    window.location.hash = input;
                    showRead();
                } else {
                    alert("Invalid link or code.");
                }
            }
        }

        function showCreate() { switchView('view-create'); }
        
        function showRead() { 
            const hash = window.location.hash.substring(1);
            if(hash) {
                encryptedPayload = hash;
                switchView('view-read');
                if(hash.startsWith("plain:")) {
                    document.getElementById('unlock-area').classList.add('hidden');
                    document.getElementById('receive-area').classList.remove('hidden');
                }
            } else {
                switchView('view-selection');
            }
        }

        function switchView(id) {
            ['view-selection', 'view-create', 'view-share', 'view-read'].forEach(v => {
                document.getElementById(v).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

       
        async function generateLink() {
            const msg = document.getElementById('create-msg').value;
            const key = document.getElementById('create-key').value;
            const max = document.getElementById('create-max').value || 1;
            
            if(!msg) return alert("Write something first!");

            // Create a package object
            const pkg = { m: msg, c: parseInt(max), id: Math.random().toString(36).substring(2, 11) };
            const str = JSON.stringify(pkg);
            const encoded = btoa(unescape(encodeURIComponent(str)));

            encryptedPayload = (key ? "enc:" : "plain:") + encoded;
            const url = window.location.origin + window.location.pathname + "#" + encryptedPayload;
            document.getElementById('final-link').innerText = url;
            switchView('view-share');
        }

        function copyLink() {
            navigator.clipboard.writeText(document.getElementById('final-link').innerText);
            document.getElementById('copy-link-btn').innerText = "Copied!";
            setTimeout(() => { document.getElementById('copy-link-btn').innerText = "Copy Link to Share"; }, 2000);
        }

        function decryptMessage() {
            // In this simple demo, we just reveal the burn button
            document.getElementById('unlock-area').classList.add('hidden');
            document.getElementById('receive-area').classList.remove('hidden');
        }

        async function burnAndCopy() {
            const btn = document.getElementById('burn-btn');
            btn.disabled = true;
            btn.innerText = "Processing...";

            const data = encryptedPayload.replace("plain:", "").replace("enc:", "");
            const pkg = JSON.parse(decodeURIComponent(escape(atob(data))));
            
            try {
                // CHANGE 1: Talking to the Netlify Function for counting
                const response = await fetch('/.netlify/functions/access-message', {
                    method: 'POST',
                    body: JSON.stringify({ 
                        messageId: pkg.id, 
                        maxCopies: pkg.c 
                    })
                });

                if (response.status === 403) {
                    alert("This letter has already reached its copy limit and was destroyed.");
                    resetApp();
                    return;
                }

                const result = await response.json();

                navigator.clipboard.writeText(pkg.m).then(() => {
                    document.getElementById('app').innerHTML = `
                        <div class="text-center space-y-4 py-8">
                            <div class="text-5xl">🔥</div>
                            <h2 class="text-xl font-bold text-red-400">Message Destroyed</h2>
                            <p class="text-slate-400">Copy ${result.count} of ${pkg.c} complete. Content copied to clipboard.</p>
                            <button onclick="resetApp()" class="text-sky-400 underline mt-4">Create new letter</button>
                        </div>
                    `;
                    window.history.replaceState(null, null, window.location.pathname);
                });
            } catch (e) {
                alert("Error connecting to security server.");
                btn.disabled = false;
                btn.innerText = "RECEIVE & BURN";
            }
        }

        window.onload = () => { if(window.location.hash) showRead(); };
    </script>
</body>
</html>
